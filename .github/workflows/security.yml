name: Security

on:
  workflow_dispatch:
  schedule:
    - cron: "37 4 * * 3"

permissions:
  contents: read

jobs:
  rust-security:
    name: Rust dependency and workflow security
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Install cargo security tools
        run: |
          cargo install cargo-audit --locked
          cargo install cargo-deny --locked

      - name: cargo audit
        run: cargo audit

      - name: cargo deny
        run: cargo deny check

      - name: Install zizmor
        run: python -m pip install --user zizmor

      - name: GitHub Actions scan
        run: |
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          "$HOME/.local/bin/zizmor" .github/workflows
