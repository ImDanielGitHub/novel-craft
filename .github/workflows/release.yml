name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build:
    name: Build release binary (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --component clippy --component rustfmt
          rustup default stable

      - name: Test
        run: cargo test

      - name: Build release
        run: cargo build --release

      - name: Package binary
        shell: bash
        run: |
          triple="$(rustc -vV | sed -n 's/^host: //p')"
          ext=""
          if [[ "${{ runner.os }}" == "Windows" ]]; then ext=".exe"; fi
          mkdir -p dist npm/bin
          cp "target/release/novel-craft${ext}" "npm/bin/novel-craft-${triple}${ext}"
          cp "target/release/novel-craft${ext}" "dist/novel-craft-${triple}${ext}"
          artifact="dist/novel-craft-${triple}${ext}"
          if command -v shasum >/dev/null 2>&1; then
            shasum -a 256 "$artifact" > "$artifact.sha256"
          else
            sha256sum "$artifact" > "$artifact.sha256"
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}
          path: |
            dist/*
            npm/bin/novel-craft-*

  publish-npm:
    name: Publish npm package
    needs: build
    runs-on: ubuntu-latest
    environment: npm
    permissions:
      contents: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Collect npm binaries
        shell: bash
        run: |
          mkdir -p npm/bin dist
          find artifacts -type f -name 'novel-craft-*' ! -name '*.sha256' -exec cp {} npm/bin/ \;
          find artifacts -type f -path '*/dist/*' -exec cp {} dist/ \;

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          registry-url: "https://registry.npmjs.org"
          package-manager-cache: false

      - name: Verify npm trusted publishing runtime
        run: |
          node --version
          npm --version

      - name: Smoke npm wrapper
        run: node npm/bin/novel-craft.js --version

      - name: Publish to npm with provenance
        run: npm publish --access public

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --generate-notes
