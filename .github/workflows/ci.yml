name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  rust:
    name: Rust (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup toolchain install stable --profile minimal --component clippy rustfmt
          rustup default stable

      - name: Format check
        run: cargo fmt --check

      - name: Cargo check
        run: cargo check

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Tests
        run: cargo test

      - name: Build
        run: cargo build --release

      - name: Prepare npm smoke binary
        shell: bash
        run: |
          triple="$(rustc -vV | sed -n 's/^host: //p')"
          ext=""
          if [[ "${{ runner.os }}" == "Windows" ]]; then ext=".exe"; fi
          mkdir -p npm/bin
          cp "target/release/novel-craft${ext}" "npm/bin/novel-craft-${triple}${ext}"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: npm wrapper smoke
        run: node npm/bin/novel-craft.js --version

      - name: npm package dry run
        run: npm pack --dry-run
